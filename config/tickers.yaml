# Univers des 21 ETFs — US (7 secteurs) + Europe (7 secteurs) + International (7 zones géo)
# Cotation : US et International en USD, Europe en EUR (Xetra)
#
# La colonne "International" remplace l'ancienne colonne EM sectorielle.
# Approche géographique : Asie (FXI, INDA, EWY), Amérique Latine (EWZ, ILF),
#                         MENA (KSA), Japon (EWJ)

universe:
  # ── Technologie ──────────────────────────────────────────────────────────
  - ticker: XLK
    name: "Technology Select Sector SPDR"
    sector: Technologie
    region: US
    currency: USD

  - ticker: EXV1.DE
    name: "iShares STOXX Europe 600 Technology"
    sector: Technologie
    region: Europe
    currency: EUR

  - ticker: FXI
    name: "iShares China Large-Cap ETF"
    sector: Chine
    region: Asie
    currency: USD

  # ── Santé ─────────────────────────────────────────────────────────────────
  - ticker: XLV
    name: "Health Care Select Sector SPDR"
    sector: Santé
    region: US
    currency: USD

  - ticker: EXV4.DE
    name: "iShares STOXX Europe 600 Health Care"
    sector: Santé
    region: Europe
    currency: EUR

  - ticker: INDA
    name: "iShares MSCI India ETF"
    sector: Inde
    region: Asie
    currency: USD

  # ── Finance ───────────────────────────────────────────────────────────────
  - ticker: XLF
    name: "Financial Select Sector SPDR"
    sector: Finance
    region: US
    currency: USD

  - ticker: EXV7.DE
    name: "iShares STOXX Europe 600 Banks"
    sector: Finance
    region: Europe
    currency: EUR

  - ticker: EWY
    name: "iShares MSCI South Korea ETF"
    sector: Corée du Sud
    region: Asie
    currency: USD

  # ── Industrie ─────────────────────────────────────────────────────────────
  - ticker: XLI
    name: "Industrial Select Sector SPDR"
    sector: Industrie
    region: US
    currency: USD

  - ticker: EXV6.DE
    name: "iShares STOXX Europe 600 Industrial G&S"
    sector: Industrie
    region: Europe
    currency: EUR

  - ticker: EWZ
    name: "iShares MSCI Brazil ETF"
    sector: Brésil
    region: Amérique Latine
    currency: USD

  # ── Biens de consommation ─────────────────────────────────────────────────
  - ticker: XLP
    name: "Consumer Staples Select Sector SPDR"
    sector: Consommation
    region: US
    currency: USD

  - ticker: EXV5.DE
    name: "iShares STOXX Europe 600 Personal & H Care"
    sector: Consommation
    region: Europe
    currency: EUR

  - ticker: ILF
    name: "iShares Latin America 40 ETF"
    sector: Amérique Latine
    region: Amérique Latine
    currency: USD

  # ── Énergie ───────────────────────────────────────────────────────────────
  - ticker: XLE
    name: "Energy Select Sector SPDR"
    sector: Énergie
    region: US
    currency: USD

  - ticker: EXV3.DE
    name: "iShares STOXX Europe 600 Oil & Gas"
    sector: Énergie
    region: Europe
    currency: EUR

  - ticker: KSA
    name: "iShares MSCI Saudi Arabia ETF"
    sector: Arabie Saoudite
    region: MENA
    currency: USD

  # ── Défense ───────────────────────────────────────────────────────────────
  - ticker: ITA
    name: "iShares U.S. Aerospace & Defense ETF"
    sector: Défense
    region: US
    currency: USD

  - ticker: EUAD
    name: "iShares MSCI Europe Aerospace & Defense"
    sector: Défense
    region: Europe
    # Note: EUAD est sur CBOE Europe, coté en USD.
    currency: USD

  - ticker: EWJ
    name: "iShares MSCI Japan ETF"
    sector: Japon
    region: Japon
    currency: USD

# Tickers EUR (Xetra) — seront convertis EUR→USD avant calcul
eur_tickers:
  - EXV1.DE
  - EXV4.DE
  - EXV7.DE
  - EXV6.DE
  - EXV5.DE
  - EXV3.DE
  # EUAD exclu : coté en USD sur CBOE Europe

# Benchmark et taux de change
benchmark: SPY
fx_ticker: "EURUSD=X"
