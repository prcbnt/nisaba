# Paramètres de la stratégie Nisabā

# ── Paramètres par stratégie ──────────────────────────────────────────────────
strategies:
  macro:
    portfolio_weight: 0.45   # Part du portefeuille total allouée à cette stratégie
    # Signal 3M-skip + 6M-skip (évite le reversal du dernier mois)
    weight_3m: 0.5
    weight_6m: 0.5
    skip_days: 21
    trading_days_3m: 63
    trading_days_6m: 126
    ma_filter_days: 200     # Filtre strict pour les marchés larges
    top_n: 2
    weights: [0.5, 0.5]
    defensive_ticker: "IEF"  # Fallback si aucun ETF > MM200 (Antonacci)

  thematic:
    portfolio_weight: 0.45
    # Signal 1M + 3M sans skip — fenêtre plus courte pour ETFs volatils/tendanciels
    weight_1m: 0.6
    weight_3m: 0.4
    skip_days: 0
    trading_days_1m: 21
    trading_days_3m: 63
    ma_filter_days: 150     # Filtre plus souple : ETFs thématiques sortent plus vite des bear markets
    top_n: 2
    weights: [0.5, 0.5]
    defensive_ticker: "IEF"  # Fallback si aucun ETF > MM150

  satellite:
    portfolio_weight: 0.10
    # DBMF — managed futures, toujours détenu, pas de filtre MA
    weight_1m: 1.0
    weight_3m: 0.0
    weight_6m: 0.0
    skip_days: 0
    trading_days_1m: 21
    trading_days_3m: 63
    trading_days_6m: 126
    ma_filter_days: 0       # 0 = filtre désactivé, position satellite toujours active
    top_n: 1
    weights: [1.0]
    # Pas de defensive_ticker : filtre désactivé, DBMF toujours en top_n

# ── Paramètres legacy (utilisés par backtester.py) ────────────────────────────
momentum:
  weight_3m: 0.5
  weight_6m: 0.5
  skip_days: 21
  trading_days_3m: 63
  trading_days_6m: 126
  ma_filter_days: 200

allocation:
  top_n: 2
  weights: [0.5, 0.5]

email:
  recipient: "pebeneteau@gmail.com"
  # Les credentials sont dans les variables d'environnement :
  # GMAIL_CLIENT_ID      → OAuth2 client ID
  # GMAIL_CLIENT_SECRET  → OAuth2 client secret
  # GMAIL_REFRESH_TOKEN  → OAuth2 refresh token
  # GMAIL_SENDER         → adresse Gmail expéditrice
  # EMAIL_RECIPIENT      → override optionnel de l'adresse destinataire

data:
  fetch_period_days: 400  # 400j calendaires ≈ 285j de bourse (nécessaire pour MM200)

backtest:
  default_start: "2020-01-01"
